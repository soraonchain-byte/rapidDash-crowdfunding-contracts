use anchor_lang::prelude::*;
use anchor_lang::solana_program::{clock::Clock, system_instruction, program::invoke, program::invoke_signed};

// ... declare_id! anda ...

#[program]
pub mod crowdfunding {
    use super::*;

    // 1. Create Campaign (Sudah Oke, pastikan deadline > now)
    pub fn create_campaign(ctx: Context<CreateCampaign>, goal: u64, deadline: i64) -> Result<()> {
        let campaign = &mut ctx.accounts.campaign;
        let clock = Clock::get()?;
        
        require!(deadline > clock.unix_timestamp, ErrorCode::InvalidDeadline);
        
        campaign.creator = ctx.accounts.creator.key();
        campaign.goal = goal;
        campaign.deadline = deadline;
        campaign.raised = 0;
        campaign.claimed = false;
        Ok(())
    }

    // 2. Contribute (DENGAN PDA CONTRIBUTION)
    pub fn contribute(ctx: Context<Contribute>, amount: u64) -> Result<()> {
        let campaign = &mut ctx.accounts.campaign;
        let contribution = &mut ctx.accounts.contribution;

        // Transfer SOL ke Vault
        let cpi_context = CpiContext::new(
            ctx.accounts.system_program.to_account_info(),
            system_instruction::transfer(
                &ctx.accounts.user.key(),
                &ctx.accounts.vault.key(),
                amount,
            ),
        );
        // Gunakan anchor_lang::solana_program::program::invoke jika manual, 
        // atau biarkan Anchor menangani via CpiContext
        anchor_lang::solana_program::program::invoke(
            &system_instruction::transfer(&ctx.accounts.user.key(), &ctx.accounts.vault.key(), amount),
            &[ctx.accounts.user.to_account_info(), ctx.accounts.vault.to_account_info()],
        )?;

        // Update Data dengan Checked Arithmetic
        campaign.raised = campaign.raised.checked_add(amount).ok_or(ErrorCode::Overflow)?;
        contribution.amount = contribution.amount.checked_add(amount).ok_or(ErrorCode::Overflow)?;

        Ok(())
    }

    // 3. Refund (LOGIKA AMAN: Baca dari PDA, bukan input user)
    pub fn refund(ctx: Context<Refund>) -> Result<()> {
        let campaign = &ctx.accounts.campaign;
        let contribution = &mut ctx.accounts.contribution;
        let clock = Clock::get()?;

        // Cek Kondisi: Gagal (raised < goal) DAN Waktu habis
        require!(clock.unix_timestamp >= campaign.deadline, ErrorCode::CampaignActive);
        require!(campaign.raised < campaign.goal, ErrorCode::GoalReached);
        
        let amount_to_refund = contribution.amount;
        require!(amount_to_refund > 0, ErrorCode::NoContribution);

        // Transfer balik menggunakan signer seeds Vault
        let seeds = &[
            b"vault",
            campaign.to_account_info().key.as_ref(),
            &[ctx.bumps.vault],
        ];
        let signer = &[&seeds[..]];

        anchor_lang::solana_program::program::invoke_signed(
            &system_instruction::transfer(&ctx.accounts.vault.key(), &ctx.accounts.user.key(), amount_to_refund),
            &[ctx.accounts.vault.to_account_info(), ctx.accounts.user.to_account_info(), ctx.accounts.system_program.to_account_info()],
            signer,
        )?;

        // Reset kontribusi agar tidak double refund
        contribution.amount = 0;
        Ok(())
    }
}

// Konteks Akun (Penting: Tambahkan init untuk contribution)
#[derive(Accounts)]
pub struct Contribute<'info> {
    #[account(mut)]
    pub campaign: Account<'info, Campaign>,
    #[account(
        init_if_needed,
        payer = user,
        space = 8 + 8, // discriminator + u64
        seeds = [b"contribution", campaign.key().as_ref(), user.key().as_ref()],
        bump
    )]
    pub contribution: Account<'info, Contribution>,
    #[account(mut)]
    pub user: Signer<'info>,
    #[account(mut, seeds = [b"vault", campaign.key().as_ref()], bump)]
    /// CHECK: Safe PDA Vault
    pub vault: AccountInfo<'info>,
    pub system_program: Program<'info, System>,
}

#[derive(Accounts)]
pub struct Refund<'info> {
    pub campaign: Account<'info, Campaign>,
    #[account(
        mut,
        seeds = [b"contribution", campaign.key().as_ref(), user.key().as_ref()],
        bump
    )]
    pub contribution: Account<'info, Contribution>,
    #[account(mut)]
    pub user: Signer<'info>,
    #[account(mut, seeds = [b"vault", campaign.key().as_ref()], bump)]
    pub vault: AccountInfo<'info>,
    pub system_program: Program<'info, System>,
}

#[error_code]
pub enum ErrorCode {
    #[msg("Deadline must be in the future.")]
    InvalidDeadline,
    #[msg("Campaign is still active.")]
    CampaignActive,
    #[msg("Campaign reached its goal, no refunds.")]
    GoalReached,
    #[msg("No contribution found for this user.")]
    NoContribution,
    #[msg("Arithmetic overflow.")]
    Overflow,
}